service: aws-serverless-starter

provider:
  name: aws
  runtime: nodejs24.x
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'dev'}

  # Global tagging for cost management and organization
  stackTags:
    Project: aws-serverless-starter
    Stage: ${self:provider.stage}
    ManagedBy: ServerlessFramework

  # Enforce logging standards
  logRetentionInDays: 30

  # Global Environment Variables
  environment:
    STAGE: ${self:provider.stage}
    NODE_OPTIONS: --enable-source-maps

# Serverless Framework v4 native build optimization
package:
  individually: true
  patterns:
    - '!node_modules/aws-sdk/**' # SDK v3 is bundled in Lambda runtime
    - 'dist/**'

functions:
  create-user:
    handler: src/infra/handlers/http/create-user.handler
    environment:
      USERS_TABLE_NAME: ${self:service}-${self:provider.stage}-users-table
      EVENT_BUS_NAME: ${self:service}-${self:provider.stage}-bus
    events:
      - httpApi:
          path: /v1/users
          method: post
  user-created-listener:
    handler: src/infra/handlers/events/user-created.handler
    events:
      - eventBridge:
          eventBus: ${self:service}-${self:provider.stage}-bus
          pattern:
            source:
              - aws.starter.users
            detail-type:
              - UserCreated

outputs:
  ServiceEndpoint:
    Description: URL of the API Gateway Endpoint
    Value: !Sub "https://${HttpApi}.execute-api.${self:provider.region}.amazonaws.com"
